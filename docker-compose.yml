version: '3.8'

services:
  # Main API Backend (Node.js)
  backend:
    build: ./backend
    ports:
      - "8005:8005"
    volumes:
      - ./backend/nimbusfs.db:/app/nimbusfs.db
    environment:
      - NODE1_URL=http://node1:8001
      - NODE2_URL=http://node2:8002
      - NODE3_URL=http://node3:8003
    depends_on:
      - node1
      - node2
      - node3
    command: ["npm", "start"]

  # Storage Node 1
  node1:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/storage/node1:/app/storage/node1
    environment:
      - NODE_NAME=node1
    command: ["npm", "run", "node", "--", "8001", "node1"]

  # Storage Node 2
  node2:
    build: ./backend
    ports:
      - "8002:8002"
    volumes:
      - ./backend/storage/node2:/app/storage/node2
    environment:
      - NODE_NAME=node2
    command: ["npm", "run", "node", "--", "8002", "node2"]

  # Storage Node 3
  node3:
    build: ./backend
    ports:
      - "8003:8003"
    volumes:
      - ./backend/storage/node3:/app/storage/node3
    environment:
      - NODE_NAME=node3
    command: ["npm", "run", "node", "--", "8003", "node3"]

  # React Frontend (Nginx)
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
